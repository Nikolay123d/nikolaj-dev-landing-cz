      <rect x="18" y="20" width="76" height="10" rx="5" fill="#c9a84c"/>
      <rect x="18" y="48" width="108" height="12" rx="6" fill="#ffffff" opacity=".66"/>
      <rect x="18" y="74" width="86" height="9" rx="5" fill="#ffffff" opacity=".28"/>
