<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-labelledby="title desc">
  <title id="title">CzechTrip landing preview</title>
  <desc id="desc">Luxury travel landing preview with Prague skyline, route cards and gold accents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset=".52" stop-color="#151515"/>
      <stop offset="1" stop-color="#2a2314"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1">
      <stop offset="0" stop-color="#c9a84c"/>
      <stop offset="1" stop-color="#f5dfa0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000" flood-opacity=".45"/>
    </filter>
  </defs>
  <rect width="1200" height="750" fill="url(#bg)"/>
  <circle cx="1030" cy="120" r="250" fill="#c9a84c" opacity=".12"/>
  <circle cx="140" cy="640" r="220" fill="#c9a84c" opacity=".08"/>
  <path d="M0 560 C170 470 290 510 420 440 C570 360 680 400 820 320 C965 240 1060 290 1200 210 L1200 750 L0 750 Z" fill="#111" opacity=".92"/>
